server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    
    client_max_body_size 250m;

    # API proxy — KEEP /api/ prefix
    location /api/ {
        proxy_pass http://backend:9002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;  # CRITICAL for SSE
        proxy_read_timeout 300s;
    }
    
    # Non-prefixed backend routes
    location ~ ^/(health|system|upload|documents|image|query|control)(/|$) {
        proxy_pass http://backend:9002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        add_header X-Accel-Buffering no;
        proxy_read_timeout 300s;
    }
    
    # WebSocket
    location /ws/ {
        proxy_pass http://backend:9002/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
    
    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Static cache
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Health
    location = /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
