services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: total-llm-v2-vllm
    ports:
      - "9000:9000"
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9000"
      - "--model"
      - "Qwen/Qwen3.5-9B"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.90"
      - "--quantization"
      - "fp8"
      - "--enforce-eager"
      - "--limit-mm-per-prompt"
      - '{"image": 2}'
    environment:
      NVIDIA_VISIBLE_DEVICES: "1"
      HUGGING_FACE_HUB_TOKEN: "${HUGGING_FACE_HUB_TOKEN:-}"
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:9000/v1/models', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    networks:
      - total-llm-v2-network

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: total-llm-v2-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - total-llm-v2-network

  redis:
    image: redis:7-alpine
    container_name: total-llm-v2-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - total-llm-v2-network

  postgres:
    image: postgres:15-alpine
    container_name: total-llm-v2-postgres
    environment:
      POSTGRES_USER: total_llm
      POSTGRES_PASSWORD: total_llm_dev
      POSTGRES_DB: total_llm
    ports:
      - "5434:5432"
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U total_llm -d total_llm"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - total-llm-v2-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: total-llm-v2-backend
    ports:
      - "9002:9002"
    environment:
      VLLM_BASE_URL: http://vllm:9000/v1
      LLM_MODEL_NAME: Qwen/Qwen3.5-9B
      VLM_BASE_URL: http://vllm:9000/v1
      VLM_MODEL_NAME: Qwen/Qwen3.5-9B
      EMBEDDING_MODEL_NAME: Qwen/Qwen3-Embedding-0.6B
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: total_llm
      POSTGRES_USER: total_llm
      POSTGRES_PASSWORD: total_llm_dev
      CORS_ORIGINS: '["http://localhost:9004", "http://frontend"]'
      JWT_SECRET: change-me-in-production
    depends_on:
      vllm:
        condition: service_started
      qdrant:
        condition: service_started
      redis:
        condition: service_started
      postgres:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/health"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - total-llm-v2-network

  frontend:
    build:
      context: ./frontend
    container_name: total-llm-v2-frontend
    ports:
      - "9004:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - total-llm-v2-network

networks:
  total-llm-v2-network:
    name: total-llm-v2-network
    driver: bridge
